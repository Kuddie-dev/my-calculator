<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculator</title> 
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5608/5608122.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        #access-panel { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #0f0; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 5px; margin-bottom: 20px; outline: none; width: 80%; }
        .menu { display: none; grid-template-columns: 1fr; gap: 15px; padding: 30px; height: 100vh; box-sizing: border-box; background: #050505; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 20px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; font-weight: bold; }
        iframe { width: 100%; height: 92vh; border: none; display: none; background: #fff; }
        #nav-bar { display: none; background: #111; height: 8vh; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #0f0; }
    </style>
</head>
<body>
    <div id="access-panel">
        <h1>SYSTEM ENCRYPTED</h1>
        <input type="password" id="passcode" placeholder="ENTER KEY">
        <button onclick="unlock()">ACCESS</button>
    </div>
    <div id="menu-screen" class="menu">
        <h2 style="color: #0f0; text-align: center;">COMMAND CENTER</h2>
        <button onclick="play('https://www.roblox.com/home')">🚀 ROBLOX</button>
        <button onclick="play('https://open.spotify.com')">🎵 SPOTIFY</button>
        <button onclick="play('https://now.gg/apps/gaijin-distribution-kft/7541/war-thunder-mobile.html')">⚔️ WAR THUNDER</button>
        <button onclick="location.reload()" style="color:red; border-color:red;">🔒 LOCK</button>
    </div>
    <div id="nav-bar">
        <button onclick="goBack()">⬅ BACK</button>
        <span style="color: #0f0;">SECURE</span>
    </div>
    <iframe id="game-frame" allow="autoplay; encrypted-media; fullscreen"></iframe>
    <script>
        const CODE = "KuddSKRT"; 
        function unlock() {
            if(document.getElementById('passcode').value === CODE) {
                document.getElementById('access-panel').style.display = 'none';
                document.getElementById('menu-screen').style.display = 'grid';
            } else { alert("WRONG CODE"); }
        }
        function play(url) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'flex';
            const frame = document.getElementById('game-frame');
            frame.style.display = 'block'; frame.src = url;
        }
        function goBack() {
            document.getElementById('game-frame').style.display = 'none';
            document.getElementById('nav-bar').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'grid';
            document.getElementById('game-frame').src = "";
        }
    </script>
</body>
</html>
