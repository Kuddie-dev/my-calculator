<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulatoriat</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5608/5608122.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; }
        #login { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #0f0; }
        input { background: #111; border: 1px solid #0f0; color: #0f0; padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 5px; margin-bottom: 10px; width: 80%; }
        #menu { display: none; flex-direction: column; gap: 15px; padding: 30px; }
        button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 20px; font-size: 1.2rem; cursor: pointer; border-radius: 10px; text-transform: uppercase; font-weight: bold; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

    <div id="login">
        <h1 style="letter-spacing: 3px;">SYSTEM ACCESS</h1>
        <input type="password" id="pass" placeholder="ENTER CODE">
        <button onclick="check()">AUTHORIZE</button>
    </div>

    <div id="menu">
        <h2 style="color:#0f0; text-align:center;">COMMAND CENTER</h2>
        <button onclick="go('https://now.gg/apps/roblox-corporation/5349/roblox.html')">🚀 LAUNCH ROBLOX</button>
        <button onclick="go('https://open.spotify.com')">🎵 OPEN SPOTIFY</button>
        <button onclick="go('https://now.gg/apps/gaijin-distribution-kft/7541/war-thunder-mobile.html')">⚔️ LAUNCH WAR THUNDER</button>
        <button onclick="location.reload()" style="color:red; border-color:red;">🔒 EXIT SESSION</button>
    </div>

    <script>
        const KEY = "KuddSKRT";
        function check() {
            if(document.getElementById('pass').value === KEY) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
            } else { alert("ACCESS DENIED"); }
        }
        function go(url) {
            // Ini ngebuka di tab baru, di iPad dia bakal buka di browser tapi tetep Fullscreen
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
